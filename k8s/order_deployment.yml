apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
  namespace: lgcns

spec:
  # 자원공간의 낭비를 방지하고 관리의 편의성을 제공해주는 옵션!!!
  revisionHistoryLimit: 2

  # replicas: 2

  # argo test
  # 현재 git에는 2개인데 3개로 변경했을 때 늘었다가 줄어드는 것을 확인
  replicas: 2


  selector:
    matchLabels:
      app: order-pod

  template:
    metadata:
      labels:
        app: order-pod

    spec:
      # docker container 
      containers:
        - name: order-container

          # ecr 경로
          image: 310095858382.dkr.ecr.us-east-1.amazonaws.com/order-mhpark0605-backend:latest
          ports:
          - containerPort: 8888

          # autoscaler(pod) 작업을 위해서 추가함
          resources:
            # 컨테이너가 사용할수 있는 리소스의 최대치
            limits:
              cpu: "1"
              memory: "500Mi"
            # 컨테이너가 시작될떄 보장받아야 하는 최소 자원
            requests:
              cpu: "0.5"
              memory: "250Mi"

          # k8s-secret 에 설정한 정보를 외부변수로 application.yml 전달!!!
          env:
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_HOST

          - name: DB_ADMIN
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_ADMIN

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_PASSWORD
          
---
# core service setting
# core group : pod, service, ConfigMap, Secret, namespace
apiVersion: v1 
kind: Service
metadata:
  name: order-service
  namespace: lgcns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8888
  selector:
    app: order-pod

